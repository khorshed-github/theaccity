<section class="job-application-form">
  <h2>Job Application Form</h2>
  <p>Please complete the form below and upload your CV to apply.</p>

  <form action="#" method="post" enctype="multipart/form-data">
    
    <div class="form-group">
      <label for="fullName">Full Name *</label>
      <input type="text" id="fullName" name="fullName" required>
    </div>

    <div class="form-group">
      <label for="address">Address *</label>
      <textarea id="address" name="address" rows="4" required></textarea>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number *</label>
      <input type="tel" id="phone" name="phone" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address *</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label for="immigration">Immigration Status / Share Code Details *</label>
      <textarea id="immigration" name="immigration" rows="3" required placeholder="Please provide your immigration status and share code details if applicable"></textarea>
    </div>

    <div class="form-group">
      <label for="nationality">Nationality *</label>
      <input type="text" id="nationality" name="nationality" required>
    </div>

    <div class="form-group">
      <label for="education">Education *</label>
      <textarea id="education" name="education" rows="4" required placeholder="Please include your qualifications, institution names, and years"></textarea>
    </div>

    <div class="form-group">
      <label for="cv">Upload CV *</label>
      <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" required>
    </div>

    <button type="submit">Submit Application</button>
  </form>
</section>
